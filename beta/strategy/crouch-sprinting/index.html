<p><dfn class="self">Crouch sprinting</dfn> is a technique for moving quickly while remaining low to the ground. If players <span class="input" title="Use (F)" data-b="F"></span> pick up a loot bag while <span class="input" title="Crouch (LeftControl)" data-b="ƍ"></span> crouched and press <span class="input" title="Sprint (LeftShift)" data-b="Ɲ"></span> during the pick-up animation, they will re-crouch but remain sprinting.</p>
